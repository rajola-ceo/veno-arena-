<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leagues - Crunk Games</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --bg-primary: #05070d;
            --bg-secondary: #0b1222;
            --bg-tertiary: #111827;
            --border-color: #1f2937;
            --text-primary: #e6e6e6;
            --text-secondary: #9ca3af;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .topbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        .back-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
        .back-btn:hover { color: var(--primary); }
        .section { margin-bottom: 40px; }
        .section-title { font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--primary); }
        .leagues-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .league-card {
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .league-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .league-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .league-meta { display: flex; gap: 15px; font-size: 12px; color: var(--text-secondary); margin-bottom: 15px; }
        .trophy { color: #fbbf24; }
        .position { font-size: 24px; font-weight: 800; margin: 10px 0; }
        .position-1 { color: #fbbf24; }
        .position-2 { color: #94a3b8; }
        .position-3 { color: #cd7f32; }
        .empty-state { text-align: center; padding: 60px; color: var(--text-secondary); }
        @media (max-width: 768px) { .leagues-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="topbar">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
        <h2>My Leagues</h2>
        <div style="width: 40px;"></div>
    </header>
    <div class="container" id="leaguesContainer">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
    </div>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('crunkUser'));
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        
        // Leagues participated in
        const participatedLeagues = leagues.filter(league => {
            return league.teams?.some(t => t.ownerId === currentUser?.userId || t.ownerId === currentUser?.uid);
        });
        
        // Leagues won
        const wonLeagues = participatedLeagues.filter(league => league.winner?.ownerId === currentUser?.userId || league.winner?.ownerId === currentUser?.uid);
        
        // Active leagues
        const activeLeagues = participatedLeagues.filter(league => league.status === 'live' || league.status === 'registration');
        
        // Completed leagues
        const completedLeagues = participatedLeagues.filter(league => league.status === 'completed');
        
        function getPositionInLeague(league) {
            if (!league.standings) return null;
            const position = league.standings.findIndex(s => s.teamId === currentUser?.userId || s.teamId === currentUser?.uid);
            return position !== -1 ? position + 1 : null;
        }
        
        function render() {
            const container = document.getElementById('leaguesContainer');
            container.innerHTML = `
                <!-- Leagues Won -->
                <div class="section">
                    <div class="section-title"><i class="fas fa-trophy"></i> 🏆 Leagues Won (${wonLeagues.length})</div>
                    <div class="leagues-grid">
                        ${wonLeagues.length === 0 ? '<div class="empty-state">No leagues won yet. Keep competing!</div>' : 
                            wonLeagues.map(league => `
                                <div class="league-card" onclick="window.location.href='league-view.html?id=${league.id}'">
                                    <div class="league-name">🏆 ${league.name}</div>
                                    <div class="league-meta"><span>${league.gameType}</span><span>🏅 Champion</span></div>
                                    <div class="position position-1">🥇 1st Place</div>
                                    <div class="league-meta">Won ${league.prizes?.first || league.prizePool * 0.5} Veno Coins</div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
                
                <!-- Active Leagues -->
                <div class="section">
                    <div class="section-title"><i class="fas fa-fire"></i> 🔥 Active Leagues (${activeLeagues.length})</div>
                    <div class="leagues-grid">
                        ${activeLeagues.length === 0 ? '<div class="empty-state">No active leagues</div>' :
                            activeLeagues.map(league => `
                                <div class="league-card" onclick="window.location.href='league-view.html?id=${league.id}'">
                                    <div class="league-name">⚡ ${league.name}</div>
                                    <div class="league-meta"><span>${league.gameType}</span><span>🟢 LIVE</span></div>
                                    <div class="position">Position: ${getPositionInLeague(league) || '?'}/${league.teams?.length || 0}</div>
                                    <div class="league-meta">${league.matches?.filter(m => m.result).length || 0}/${league.matches?.length || 0} matches played</div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
                
                <!-- Completed Leagues -->
                <div class="section">
                    <div class="section-title"><i class="fas fa-clock"></i> 📅 Completed Leagues (${completedLeagues.length})</div>
                    <div class="leagues-grid">
                        ${completedLeagues.length === 0 ? '<div class="empty-state">No completed leagues</div>' :
                            completedLeagues.map(league => `
                                <div class="league-card" onclick="window.location.href='league-view.html?id=${league.id}'">
                                    <div class="league-name">${league.name}</div>
                                    <div class="league-meta"><span>${league.gameType}</span><span>✅ Completed</span></div>
                                    <div class="position">Final Position: ${getPositionInLeague(league) || '?'}/${league.teams?.length || 0}</div>
                                    <div class="league-meta">${league.prizePool} VC Prize Pool</div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `;
        }
        
        render();
    </script>
</body>
</html>
