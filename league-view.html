<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>League View - Crunk Games</title>
    
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="nav.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-primary: #05070d;
            --bg-secondary: #0b1222;
            --bg-tertiary: #111827;
            --border-color: #1f2937;
            --text-primary: #e6e6e6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .menu {
            font-size: 24px;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s ease;
            padding: 8px;
            border-radius: 50%;
        }

        .menu:hover {
            background: rgba(16, 185, 129, 0.1);
            transform: scale(1.1);
        }

        .icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .veno-coins-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .veno-coins-display {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .veno-coins-display i {
            color: #fbbf24;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid var(--primary);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            transition: all 0.3s ease;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h3 {
            color: var(--primary);
            font-size: 20px;
        }

        .close-sidebar {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-sidebar:hover {
            color: #ff5555;
            transform: rotate(90deg);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .sidebar-menu li i {
            width: 24px;
            color: var(--primary);
        }

        .sidebar-menu li:hover {
            background: var(--primary);
            color: var(--bg-primary);
            transform: translateX(5px);
        }

        .sidebar-menu li:hover i {
            color: var(--bg-primary);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* League View Container */
        .league-view-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .league-header {
            background: linear-gradient(135deg, #1f2937, #111827);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .league-name {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .league-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 8px 16px;
            border-radius: 30px;
        }
        
        .join-league-btn {
            padding: 12px 30px;
            background: #10b981;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .join-league-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }
        
        .join-league-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }
        
        .section-header h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .teams-grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .team-card-view {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .team-card-view:hover {
            transform: translateY(-3px);
            border-color: #10b981;
        }
        
        .team-logo-view {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .team-name-view {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .team-stats-view {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Standings Table */
        .standings-table {
            width: 100%;
            background: var(--bg-tertiary);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .standings-table th,
        .standings-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .standings-table th {
            background: var(--bg-secondary);
            color: var(--primary);
        }
        
        .team-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .team-logo-small {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* Fixtures */
        .fixtures-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .match-card {
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .match-card:hover {
            border-color: var(--primary);
        }
        
        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .match-teams {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }
        
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .vs {
            font-weight: 700;
            color: var(--primary);
        }
        
        .match-result {
            font-size: 20px;
            font-weight: 700;
        }
        
        .upload-screenshot-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .upload-screenshot-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
        }
        
        .toast {
            background: var(--primary);
            color: var(--bg-primary);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .topbar {
                padding: 0 16px;
            }
            
            .league-name {
                font-size: 24px;
            }
            
            .match-info {
                flex-direction: column;
                text-align: center;
            }
            
            .match-teams {
                flex-direction: column;
                gap: 10px;
            }
            
            .standings-table {
                font-size: 12px;
            }
            
            .standings-table th,
            .standings-table td {
                padding: 8px;
            }
        }
        
        @media (max-width: 480px) {
            .league-meta {
                gap: 10px;
            }
            
            .meta-item {
                font-size: 12px;
                padding: 4px 10px;
            }
            
            .teams-grid-view {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="topbar">
        <div class="menu" id="menuBtn"><i class="bx bx-menu"></i></div>
        <div class="brand"><h1>🏆 League View</h1></div>
        <div class="icons">
            <div class="veno-coins-container">
                <div class="veno-coins-display">
                    <i class="fas fa-coins"></i>
                    <span id="venoCoinsAmount">0</span>
                </div>
            </div>
            <div class="profile-dropdown" id="profileDropdown">
                <img id="googleProfilePic" class="profile-pic" src="https://ui-avatars.com/api/?name=User&background=10b981&color=fff&size=128">
                <div class="profile-popup" id="profilePopup" style="display: none; position: absolute; top: 50px; right: 0; background: var(--bg-tertiary); border-radius: 12px; padding: 15px; width: 200px;">
                    <div class="account-info">
                        <img id="popupProfilePic" style="width: 40px; height: 40px; border-radius: 50%;">
                        <div>
                            <p id="accountName"></p>
                            <p id="accountEmail" style="font-size: 11px;"></p>
                        </div>
                    </div>
                    <button id="logoutBtn" style="width: 100%; padding: 8px; background: #ff5555; border: none; border-radius: 8px; color: white; cursor: pointer;">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <span class="close-sidebar" id="closeSidebar"><i class="bx bx-x"></i></span>
        </div>
        <ul class="sidebar-menu">
            <li id="menuHome"><i class="bx bx-home"></i> Home</li>
            <li id="menuTournaments"><i class="bx bx-trophy"></i> Tournaments</li>
            <li id="menuLeagues"><i class="bx bx-calendar-event"></i> My Leagues</li>
            <li id="menuTeams"><i class="bx bx-group"></i> My Teams</li>
            <li id="menuLeaderboard"><i class="bx bx-bar-chart-alt-2"></i> Leaderboard</li>
        </ul>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="league-view-container" id="leagueViewContainer">
        <div class="league-header">
            <div class="league-name" id="leagueName">Loading...</div>
            <div class="league-meta" id="leagueMeta"></div>
            <button class="join-league-btn" id="joinLeagueBtn">Join League</button>
        </div>
        
        <div class="section-header">
            <h2><i class="fas fa-users"></i> Participating Teams</h2>
        </div>
        <div class="teams-grid-view" id="teamsGrid"></div>
        
        <div class="section-header">
            <h2><i class="fas fa-chart-line"></i> Standings</h2>
        </div>
        <div class="standings-table-wrapper">
            <table class="standings-table" id="standingsTable">
                <thead>
                    <tr><th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr>
                </thead>
                <tbody id="standingsBody"></tbody>
            </table>
        </div>
        
        <div class="section-header">
            <h2><i class="fas fa-calendar"></i> Fixtures</h2>
        </div>
        <div class="fixtures-grid" id="fixturesList"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
</div>

<script>
    // ================= HAMBURGER MENU =================
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.add('open');
                if (overlay) overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
            
            const closeFunc = () => {
                sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            };
            
            if (closeSidebar) closeSidebar.addEventListener('click', closeFunc);
            if (overlay) overlay.addEventListener('click', closeFunc);
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar.classList.contains('open')) closeFunc();
            });
        }
        
        // Sidebar Navigation
        const menuHome = document.getElementById('menuHome');
        const menuTournaments = document.getElementById('menuTournaments');
        const menuLeagues = document.getElementById('menuLeagues');
        const menuTeams = document.getElementById('menuTeams');
        const menuLeaderboard = document.getElementById('menuLeaderboard');
        
        if (menuHome) menuHome.addEventListener('click', () => window.location.href = 'home.html');
        if (menuTournaments) menuTournaments.addEventListener('click', () => window.location.href = 'tournaments.html');
        if (menuLeagues) menuLeagues.addEventListener('click', () => window.location.href = 'my-leagues.html');
        if (menuTeams) menuTeams.addEventListener('click', () => window.location.href = 'teams.html');
        if (menuLeaderboard) menuLeaderboard.addEventListener('click', () => window.location.href = 'leaderboard.html');
        
        // Profile Dropdown
        const profileDropdown = document.getElementById('profileDropdown');
        const profilePopup = document.getElementById('profilePopup');
        if (profileDropdown && profilePopup) {
            profileDropdown.addEventListener('click', (e) => {
                e.stopPropagation();
                profilePopup.style.display = profilePopup.style.display === 'block' ? 'none' : 'block';
            });
            document.addEventListener('click', () => profilePopup.style.display = 'none');
        }
        
        // Logout
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('crunkUser');
                window.location.href = 'index.html';
            });
        }
    });
    
    // ================= LEAGUE LOGIC =================
    const urlParams = new URLSearchParams(window.location.search);
    const leagueId = urlParams.get('id');
    let currentLeague = null;
    let currentUser = null;
    
    function loadLeagueData() {
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        currentLeague = leagues.find(l => l.id === leagueId);
        
        if (!currentLeague) {
            showToast('League not found', 'error');
            setTimeout(() => window.location.href = 'tournaments.html', 1500);
            return;
        }
        
        document.getElementById('leagueName').innerText = currentLeague.name;
        
        const metaHtml = `
            <div class="meta-item"><i class="fas fa-gamepad"></i> ${currentLeague.gameType}</div>
            <div class="meta-item"><i class="fas fa-users"></i> ${currentLeague.teams?.length || 0}/${currentLeague.maxTeams} Teams</div>
            <div class="meta-item"><i class="fas fa-trophy"></i> Prize: ${currentLeague.prizePool || 0} VC</div>
            <div class="meta-item"><i class="fas fa-coins"></i> Entry: ${currentLeague.entryFee || 0} VC</div>
            <div class="meta-item"><i class="fas fa-chart-line"></i> Format: ${currentLeague.format === 'league' ? 'Round Robin' : currentLeague.format === 'group' ? 'Group + Knockout' : 'Cup'}</div>
        `;
        document.getElementById('leagueMeta').innerHTML = metaHtml;
        
        renderTeams();
        renderStandings();
        renderFixtures();
        
        if (currentUser && currentLeague.teams?.some(t => t.ownerId === currentUser.uid)) {
            const joinBtn = document.getElementById('joinLeagueBtn');
            if (joinBtn) {
                joinBtn.style.display = 'none';
            }
        }
    }
    
    function renderTeams() {
        const container = document.getElementById('teamsGrid');
        const teams = currentLeague.teams || [];
        
        if (teams.length === 0) {
            container.innerHTML = '<div class="empty-state">No teams joined yet. Be the first!</div>';
            return;
        }
        
        container.innerHTML = '';
        teams.forEach(team => {
            const teamCard = document.createElement('div');
            teamCard.className = 'team-card-view';
            teamCard.onclick = () => window.location.href = `team-view.html?id=${team.id}`;
            teamCard.innerHTML = `
                <div class="team-logo-view">
                    ${team.logo ? `<img src="${team.logo}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-shield-alt" style="font-size:30px;"></i>'}
                </div>
                <div class="team-name-view">${team.name}</div>
                <div class="team-stats-view">Owner: ${team.ownerName || 'Unknown'}</div>
            `;
            container.appendChild(teamCard);
        });
    }
    
    function renderStandings() {
        const tbody = document.getElementById('standingsBody');
        if (!tbody) return;
        
        const standings = [];
        const teams = currentLeague.teams || [];
        
        teams.forEach(team => {
            standings.push({
                teamId: team.id,
                teamName: team.name,
                teamLogo: team.logo,
                played: 0, wins: 0, draws: 0, losses: 0,
                goalsFor: 0, goalsAgainst: 0, points: 0
            });
        });
        
        (currentLeague.matches || []).forEach(match => {
            if (match.result) {
                const homeTeam = standings.find(s => s.teamId === match.homeTeamId);
                const awayTeam = standings.find(s => s.teamId === match.awayTeamId);
                if (homeTeam && awayTeam) {
                    homeTeam.played++; awayTeam.played++;
                    homeTeam.goalsFor += match.homeScore; homeTeam.goalsAgainst += match.awayScore;
                    awayTeam.goalsFor += match.awayScore; awayTeam.goalsAgainst += match.homeScore;
                    if (match.homeScore > match.awayScore) {
                        homeTeam.wins++; homeTeam.points += 3; awayTeam.losses++;
                    } else if (match.homeScore < match.awayScore) {
                        awayTeam.wins++; awayTeam.points += 3; homeTeam.losses++;
                    } else {
                        homeTeam.draws++; awayTeam.draws++;
                        homeTeam.points += 1; awayTeam.points += 1;
                    }
                }
            }
        });
        
        standings.sort((a, b) => {
            if (a.points !== b.points) return b.points - a.points;
            const gdA = a.goalsFor - a.goalsAgainst;
            const gdB = b.goalsFor - b.goalsAgainst;
            return gdB - gdA;
        });
        
        tbody.innerHTML = '';
        standings.forEach((team, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${index + 1}</strong></td>
                    <td class="team-cell"><div class="team-logo-small">${team.teamLogo ? `<img src="${team.teamLogo}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-shield-alt"></i>'}</div> ${team.teamName}</td>
                    <td>${team.played}</td><td>${team.wins}</td><td>${team.draws}</td><td>${team.losses}</td>
                    <td>${team.goalsFor}</td><td>${team.goalsAgainst}</td><td>${team.goalsFor - team.goalsAgainst}</td>
                    <td><strong>${team.points}</strong></td>
                </tr>
            `;
        });
    }
    
    function renderFixtures() {
        const container = document.getElementById('fixturesList');
        const matches = currentLeague.matches || [];
        
        if (matches.length === 0) {
            container.innerHTML = '<div class="empty-state">Fixtures will be generated when teams join.</div>';
            return;
        }
        
        container.innerHTML = '';
        matches.forEach(match => {
            const homeTeam = currentLeague.teams?.find(t => t.id === match.homeTeamId);
            const awayTeam = currentLeague.teams?.find(t => t.id === match.awayTeamId);
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match-card';
            matchDiv.innerHTML = `
                <div class="match-info">
                    <div class="match-teams">
                        <div class="team"><strong>${homeTeam?.name || 'TBD'}</strong></div>
                        <div class="vs">VS</div>
                        <div class="team"><strong>${awayTeam?.name || 'TBD'}</strong></div>
                    </div>
                    <div class="match-result">${match.result ? `${match.homeScore} - ${match.awayScore}` : 'Not Played'}</div>
                    ${match.screenshot ? `<button class="upload-screenshot-btn" onclick="viewScreenshot('${match.screenshot}')"><i class="fas fa-image"></i> View Screenshot</button>` : ''}
                </div>
            `;
            container.appendChild(matchDiv);
        });
    }
    
    function viewScreenshot(url) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;';
        modal.innerHTML = `<div style="background:var(--bg-primary);border-radius:24px;padding:20px;max-width:90%;"><span style="float:right;font-size:24px;cursor:pointer;" onclick="this.closest('div').parentElement.remove()">&times;</span><img src="${url}" style="max-width:100%;border-radius:12px;margin-top:20px;"></div>`;
        document.body.appendChild(modal);
    }
    
    function joinLeague() {
        if (!currentUser) {
            showToast('Please login first', 'error');
            window.location.href = 'index.html';
            return;
        }
        
        const userCoins = parseInt(localStorage.getItem('venoCoins') || '0');
        if (currentLeague.entryFee > userCoins) {
            showToast(`Need ${currentLeague.entryFee} Veno Coins to join!`, 'error');
            return;
        }
        
        if (!currentLeague.pendingRequests) currentLeague.pendingRequests = [];
        currentLeague.pendingRequests.push({
            id: 'team_' + Date.now(),
            teamName: currentUser.displayName + "'s Team",
            ownerId: currentUser.uid,
            ownerName: currentUser.displayName,
            logo: currentUser.photoURL
        });
        
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        const index = leagues.findIndex(l => l.id === leagueId);
        if (index !== -1) {
            leagues[index] = currentLeague;
            localStorage.setItem('leagues', JSON.stringify(leagues));
        }
        
        showToast('Join request sent to league owner!', 'success');
        const joinBtn = document.getElementById('joinLeagueBtn');
        if (joinBtn) {
            joinBtn.disabled = true;
            joinBtn.textContent = 'Request Sent';
        }
    }
    
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    function getVenoCoins() { return parseInt(localStorage.getItem('venoCoins') || '0'); }
    document.getElementById('venoCoinsAmount').innerText = getVenoCoins();
    
    document.getElementById('joinLeagueBtn')?.addEventListener('click', joinLeague);
    
    loadLeagueData();
</script>
