<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>League View - Crunk Games</title>
    
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="nav.css">
    
    <style>
        .league-view-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .league-header {
            background: linear-gradient(135deg, #1f2937, #111827);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .league-name {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .league-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 8px 16px;
            border-radius: 30px;
        }
        
        .join-league-btn {
            padding: 12px 30px;
            background: #10b981;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .join-league-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }
        
        .teams-grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .team-card-view {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .team-card-view:hover {
            transform: translateY(-3px);
            border-color: #10b981;
        }
        
        .team-logo-view {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .team-name-view {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .team-stats-view {
            font-size: 11px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="app">
    <header class="topbar">
        <div class="menu" id="menuBtn"><i class="bx bx-menu"></i></div>
        <div class="brand"><h1>🏆 League View</h1></div>
        <div class="icons">
            <div class="veno-coins-container"><div class="veno-coins-display"><i class="fas fa-coins"></i><span id="venoCoinsAmount">0</span></div></div>
            <div class="profile-dropdown" id="profileDropdown">
                <img id="googleProfilePic" class="profile-pic">
                <div class="profile-popup" id="profilePopup">
                    <div class="account-info"><img id="popupProfilePic"><div><p id="accountName"></p><p id="accountEmail"></p></div></div>
                    <button id="logoutBtn"><i class="bx bx-log-out"></i> Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>Menu</h3><span class="close-sidebar" id="closeSidebar"><i class="bx bx-x"></i></span></div>
        <ul class="sidebar-menu">
            <li id="menuHome"><i class="bx bx-home"></i> Home</li>
            <li id="menuTournaments"><i class="bx bx-trophy"></i> Tournaments</li>
        </ul>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="league-view-container" id="leagueViewContainer">
        <div class="league-header">
            <div class="league-name" id="leagueName">Loading...</div>
            <div class="league-meta" id="leagueMeta"></div>
            <button class="join-league-btn" id="joinLeagueBtn">Join League</button>
        </div>
        
        <div class="section-header"><h2><i class="fas fa-users"></i> Participating Teams</h2></div>
        <div class="teams-grid-view" id="teamsGrid"></div>
        
        <div class="section-header"><h2><i class="fas fa-chart-line"></i> Standings</h2></div>
        <div class="standings-table-wrapper">
            <table class="standings-table" id="standingsTable">
                <thead><tr><th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
                <tbody id="standingsBody"></tbody>
            </table>
        </div>
        
        <div class="section-header"><h2><i class="fas fa-calendar"></i> Fixtures</h2></div>
        <div class="fixtures-grid" id="fixturesList"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const leagueId = urlParams.get('id');
    let currentLeague = null;
    let currentUser = null;
    
    function loadLeagueData() {
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        currentLeague = leagues.find(l => l.id === leagueId);
        
        if (!currentLeague) {
            showToast('League not found', 'error');
            setTimeout(() => window.location.href = 'tournaments.html', 1500);
            return;
        }
        
        document.getElementById('leagueName').innerText = currentLeague.name;
        
        const metaHtml = `
            <div class="meta-item"><i class="fas fa-gamepad"></i> ${currentLeague.gameType}</div>
            <div class="meta-item"><i class="fas fa-users"></i> ${currentLeague.teams?.length || 0}/${currentLeague.maxTeams} Teams</div>
            <div class="meta-item"><i class="fas fa-trophy"></i> Prize: ${currentLeague.prizePool || 0} VC</div>
            <div class="meta-item"><i class="fas fa-coins"></i> Entry: ${currentLeague.entryFee || 0} VC</div>
            <div class="meta-item"><i class="fas fa-chart-line"></i> Format: ${currentLeague.format === 'league' ? 'Round Robin' : currentLeague.format === 'group' ? 'Group + Knockout' : 'Cup'}</div>
        `;
        document.getElementById('leagueMeta').innerHTML = metaHtml;
        
        renderTeams();
        renderStandings();
        renderFixtures();
        
        // Check if user already joined
        if (currentUser && currentLeague.teams?.some(t => t.ownerId === currentUser.uid)) {
            document.getElementById('joinLeagueBtn').style.display = 'none';
        }
    }
    
    function renderTeams() {
        const container = document.getElementById('teamsGrid');
        const teams = currentLeague.teams || [];
        
        if (teams.length === 0) {
            container.innerHTML = '<div class="empty-state">No teams joined yet. Be the first!</div>';
            return;
        }
        
        container.innerHTML = '';
        teams.forEach(team => {
            const teamCard = document.createElement('div');
            teamCard.className = 'team-card-view';
            teamCard.onclick = () => window.location.href = `team-view.html?id=${team.id}`;
            teamCard.innerHTML = `
                <div class="team-logo-view">
                    ${team.logo ? `<img src="${team.logo}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-shield-alt" style="font-size:30px;"></i>'}
                </div>
                <div class="team-name-view">${team.name}</div>
                <div class="team-stats-view">Owner: ${team.ownerName || 'Unknown'}</div>
            `;
            container.appendChild(teamCard);
        });
    }
    
    function renderStandings() {
        const tbody = document.getElementById('standingsBody');
        if (!tbody) return;
        
        const standings = [];
        const teams = currentLeague.teams || [];
        
        teams.forEach(team => {
            standings.push({
                teamId: team.id,
                teamName: team.name,
                teamLogo: team.logo,
                played: 0, wins: 0, draws: 0, losses: 0,
                goalsFor: 0, goalsAgainst: 0, points: 0
            });
        });
        
        (currentLeague.matches || []).forEach(match => {
            if (match.result) {
                const homeTeam = standings.find(s => s.teamId === match.homeTeamId);
                const awayTeam = standings.find(s => s.teamId === match.awayTeamId);
                if (homeTeam && awayTeam) {
                    homeTeam.played++; awayTeam.played++;
                    homeTeam.goalsFor += match.homeScore; homeTeam.goalsAgainst += match.awayScore;
                    awayTeam.goalsFor += match.awayScore; awayTeam.goalsAgainst += match.homeScore;
                    if (match.homeScore > match.awayScore) {
                        homeTeam.wins++; homeTeam.points += 3; awayTeam.losses++;
                    } else if (match.homeScore < match.awayScore) {
                        awayTeam.wins++; awayTeam.points += 3; homeTeam.losses++;
                    } else {
                        homeTeam.draws++; awayTeam.draws++;
                        homeTeam.points += 1; awayTeam.points += 1;
                    }
                }
            }
        });
        
        standings.sort((a, b) => {
            if (a.points !== b.points) return b.points - a.points;
            const gdA = a.goalsFor - a.goalsAgainst;
            const gdB = b.goalsFor - b.goalsAgainst;
            return gdB - gdA;
        });
        
        tbody.innerHTML = '';
        standings.forEach((team, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td class="team-cell"><div class="team-logo-small">${team.teamLogo ? `<img src="${team.teamLogo}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-shield-alt"></i>'}</div> ${team.teamName}</td>
                    <td>${team.played}</td><td>${team.wins}</td><td>${team.draws}</td><td>${team.losses}</td>
                    <td>${team.goalsFor}</td><td>${team.goalsAgainst}</td><td>${team.goalsFor - team.goalsAgainst}</td>
                    <td><strong>${team.points}</strong></td>
                </tr>
            `;
        });
    }
    
    function renderFixtures() {
        const container = document.getElementById('fixturesList');
        const matches = currentLeague.matches || [];
        
        if (matches.length === 0) {
            container.innerHTML = '<div class="empty-state">Fixtures will be generated when teams join.</div>';
            return;
        }
        
        container.innerHTML = '';
        matches.forEach(match => {
            const homeTeam = currentLeague.teams?.find(t => t.id === match.homeTeamId);
            const awayTeam = currentLeague.teams?.find(t => t.id === match.awayTeamId);
            container.innerHTML += `
                <div class="match-card">
                    <div class="match-info">
                        <div class="match-teams">
                            <div class="team"><strong>${homeTeam?.name || 'TBD'}</strong></div>
                            <div class="vs">VS</div>
                            <div class="team"><strong>${awayTeam?.name || 'TBD'}</strong></div>
                        </div>
                        <div class="match-result">${match.result ? `${match.homeScore} - ${match.awayScore}` : 'Not Played'}</div>
                        ${match.screenshot ? `<button class="upload-screenshot-btn" onclick="viewScreenshot('${match.screenshot}')"><i class="fas fa-image"></i> View Screenshot</button>` : ''}
                    </div>
                </div>
            `;
        });
    }
    
    function viewScreenshot(url) {
        const modal = document.createElement('div');
        modal.className = 'modal active';
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;';
        modal.innerHTML = `<div style="background:var(--bg-primary);border-radius:24px;padding:20px;max-width:90%;"><span style="float:right;font-size:24px;cursor:pointer;" onclick="this.closest('.modal').remove()">&times;</span><img src="${url}" style="max-width:100%;border-radius:12px;margin-top:20px;"></div>`;
        document.body.appendChild(modal);
    }
    
    function joinLeague() {
        if (!currentUser) {
            showToast('Please login first', 'error');
            window.location.href = 'index.html';
            return;
        }
        
        const userCoins = parseInt(localStorage.getItem('venoCoins') || '0');
        if (currentLeague.entryFee > userCoins) {
            showToast(`Need ${currentLeague.entryFee} Veno Coins to join!`, 'error');
            return;
        }
        
        // Add to pending requests
        if (!currentLeague.pendingRequests) currentLeague.pendingRequests = [];
        currentLeague.pendingRequests.push({
            id: 'team_' + Date.now(),
            teamName: currentUser.displayName + "'s Team",
            ownerId: currentUser.uid,
            ownerName: currentUser.displayName,
            logo: currentUser.photoURL
        });
        
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        const index = leagues.findIndex(l => l.id === leagueId);
        if (index !== -1) {
            leagues[index] = currentLeague;
            localStorage.setItem('leagues', JSON.stringify(leagues));
        }
        
        showToast('Join request sent to league owner!', 'success');
        document.getElementById('joinLeagueBtn').disabled = true;
        document.getElementById('joinLeagueBtn').textContent = 'Request Sent';
    }
    
    document.getElementById('joinLeagueBtn')?.addEventListener('click', joinLeague);
    
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    loadLeagueData();
    
    function getVenoCoins() { return parseInt(localStorage.getItem('venoCoins') || '0'); }
    document.getElementById('venoCoinsAmount').innerText = getVenoCoins();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBW0Sz7TODfa8tQJTfNUaLhfK9qJhdA1yE",
        authDomain: "crunck-app.firebaseapp.com",
        projectId: "crunck-app",
        storageBucket: "crunck-app.firebasestorage.app",
        messagingSenderId: "475953302982",
        appId: "1:475953302982:web:607e08379adb12f985f6c7"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUser = user;
            document.getElementById('googleProfilePic').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}&background=10b981&color=fff`;
            document.getElementById('popupProfilePic').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}&background=10b981&color=fff`;
            document.getElementById('accountName').innerText = user.displayName;
            document.getElementById('accountEmail').innerText = user.email;
        } else {
            window.location.href = 'index.html';
        }
    });
</script>

<script src="nav.js"></script>
</body>
</html>
