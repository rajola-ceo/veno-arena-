<!-- Created by rajola - Updated with country codes and Google OAuth -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to veno-arena - Your ultimate gaming platform">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./login.css">
    
    <title>Veno-arena-login</title>
    
    <!-- Google Identity Services (using your Firebase Client ID) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- PWA Meta Tags -->
    <!-- PWA Meta Tags - Required for icon to show when sharing -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#10b981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crunk Games">
<meta name="mobile-web-app-capable" content="yes">
<meta name="msapplication-TileColor" content="#10b981">
<meta name="msapplication-TileImage" content="/icons/icon-144x144.png">

<!-- Favicon and Icons - CRITICAL for link sharing -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png">
<link rel="apple-touch-icon" sizes="114x114" href="/icons/icon-114x114.png">
<link rel="apple-touch-icon" sizes="76x76" href="/icons/icon-76x76.png">
<link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png">
<link rel="apple-touch-icon" sizes="60x60" href="/icons/icon-60x60.png">
<link rel="apple-touch-icon" sizes="57x57" href="/icons/icon-57x57.png">

<!-- For social sharing (WhatsApp, Facebook, Twitter, Telegram) -->
<meta property="og:title" content="Crunk Games">
<meta property="og:description" content="Play tournaments, create teams, and earn Veno Coins!">
<meta property="og:image" content="https://your-domain.com/icon-512x512.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:type" content="website">
<meta property="og:url" content="https://your-domain.com">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Crunk Games">
<meta name="twitter:description" content="Play tournaments, create teams, and earn Veno Coins!">
<meta name="twitter:image" content="https://your-domain.com/icon-512x512.png">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
    </div>

    <div class="container">
        <!-- Logo / Brand -->
        <div class="logo-container">
            <i class="fas fa-gamepad logo-icon"></i>
            <h1>veno-arena</h1>
            <p class="tagline">Your Ultimate Gaming Destination</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <!-- Username Field -->
            <div class="form-control">
                <input type="text" id="username" required autocomplete="off">
                <label>Username</label>
                <i class="fas fa-user input-icon"></i>
                <span id="usernameError" class="error-message"></span>
            </div>
            
            <!-- Email Field -->
            <div class="form-control">
                <input type="email" id="email" required autocomplete="off">
                <label>Email</label>
                <i class="fas fa-envelope input-icon"></i>
                <span id="emailError" class="error-message"></span>
            </div>
            
            <!-- Phone Number with Country Code -->
            <div class="form-control">
                <div class="phone-input-group">
                    <select id="countryCode" class="country-code" required>
                        <option value="" disabled selected>🌍 Select Code</option>
                    </select>
                    <div class="phone-input-wrapper">
                        <input type="tel" id="phone" required autocomplete="off">
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>
                <span id="phoneError" class="error-message"></span>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login / Register</span>
                <div class="btn-loader" style="display: none;"></div>
            </button>
            
            <!-- Message Display -->
            <p class="text message" id="message"></p>
        </form>
        
        <!-- Divider -->
        <div class="divider">
            <span>Or continue with</span>
        </div>
        
        <!-- Google Login Button (Using Firebase OAuth, not GSI directly) -->
        <div class="google-login-wrapper">
            <button onclick="window.handleGoogleLogin()" class="google-btn">
                <i class="fab fa-google"></i>
                <span>Continue with Google</span>
            </button>
        </div>
        
        <!-- Alternative Login Options -->
        <div class="alt-login">
            <button class="btn-phone" onclick="showPhoneLogin()">
                <i class="fas fa-mobile-alt"></i>
                <span>Phone Login</span>
            </button>
        </div>
        
        <!-- Footer -->
        <div class="footer-links">
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Help</a>
        </div>
    </div>
    
    <!-- Phone Login Modal (Hidden by default) -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePhoneModal()">&times;</span>
            <h2><i class="fas fa-mobile-alt"></i> Phone Login</h2>
            <p>Enter your phone number to receive a verification code</p>
            
            <div class="modal-form">
                <div class="form-control">
                    <div class="phone-input-group">
                        <select id="modalCountryCode" class="country-code"></select>
                        <input type="tel" id="modalPhone" placeholder="Phone number">
                    </div>
                </div>
                
                <div id="recaptcha-container"></div>
                
                <button class="btn btn-primary" onclick="sendOTP()">
                    <i class="fas fa-paper-plane"></i> Send OTP
                </button>
                
                <div class="otp-section" style="display: none;">
                    <input type="text" id="otpCode" placeholder="Enter 6-digit OTP">
                    <button class="btn btn-secondary" onclick="verifyOTP()">Verify</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loader -->
    <div id="loader" class="loader-overlay">
        <div class="loader-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <p>Loading...</p>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts - Only ONE Firebase initialization (in login.js) -->
    <script type="module" src="./login.js"></script>
    
    <!-- Additional script for modal functions -->
    <script>
        // Modal functions
        function showPhoneLogin() {
            document.getElementById('phoneModal').style.display = 'flex';
        }
        
        function closePhoneModal() {
            document.getElementById('phoneModal').style.display = 'none';
        }
        
        function sendOTP() {
            alert('Phone login will be implemented soon!');
        }
        
        function verifyOTP() {
            alert('OTP verification coming soon!');
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('phoneModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }<!-- PWA Registration -->

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registered:', registration);
                    
                    // Check for updates
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        console.log('🔄 New service worker found');
                        
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('📱 Update available - refresh to get new version');
                                showUpdateToast();
                            }
                        });
                    });
                })
                .catch(error => {
                    console.error('❌ Service Worker registration failed:', error);
                });
        });
    }
    
    // Show update notification
    function showUpdateToast() {
        const toast = document.createElement('div');
        toast.className = 'pwa-update-toast';
        toast.innerHTML = `
            <i class="fas fa-download"></i>
            <span>New version available!</span>
            <button onclick="location.reload()">Update</button>
        `;
        toast.style.cssText = `
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: var(--primary, #10b981);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        `;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideDown 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }
    
    // Check if app is installed
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        
        // Show install button
        const installBtn = document.getElementById('installAppBtn');
        if (installBtn) {
            installBtn.style.display = 'flex';
            installBtn.addEventListener('click', () => {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') {
                        console.log('✅ User accepted the install prompt');
                    }
                    window.deferredPrompt = null;
                    installBtn.style.display = 'none';
                });
            });
        }
    });
    
    // Check if app is already installed
    window.addEventListener('appinstalled', () => {
        console.log('📱 App installed successfully');
        const installBtn = document.getElementById('installAppBtn');
        if (installBtn) installBtn.style.display = 'none';
    });
    
    // Add animations
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100px); opacity: 0; }
        }
    `;
    document.head.appendChild(style);

    </script>
    <!-- Add Install Button to Top Bar (optional) -->
<button id="installAppBtn" style="display: none; background: none; border: none; color: var(--primary); cursor: pointer;">
    <i class="fas fa-download"></i>
</button>
</body>
</html>
