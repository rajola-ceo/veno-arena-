<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Login to Veno-Arena - Your Ultimate Gaming Platform">
    
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <title>Veno-Arena - Login</title>
    
    <style>
        /* ================= GOLDEN YELLOW THEME ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #FFD700;
            --primary-dark: #FFC700;
            --primary-light: #FFED4E;
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-start: #0f3460;
            --container-end: #162747;
            --text-light: #FFE066;
            --error: #ff5555;
            --success: #00C851;
            --info: #FFD700;
            --border-color: #FFD700;
            --input-bg: rgba(255, 215, 0, 0.08);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* ================= BACKGROUND ANIMATION ================= */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.08);
            animation: float 20s infinite;
        }

        .circle-1 { width: 500px; height: 500px; top: -250px; right: -100px; }
        .circle-2 { width: 400px; height: 400px; bottom: -200px; left: -100px; animation-delay: 5s; }
        .circle-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 50px) scale(1.1); }
            50% { transform: translate(0, 100px) scale(1); }
            75% { transform: translate(-50px, 50px) scale(0.9); }
        }

        /* ================= CONTAINER ================= */
        .container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 95%;
            background: linear-gradient(145deg, var(--container-start), var(--container-end));
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), 0 12px 35px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .container.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ================= LOGO SECTION ================= */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 15px;
            animation: bounce 2s infinite;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            opacity: 0.85;
        }

        /* ================= FORM CONTROLS ================= */
        .form-control {
            position: relative;
            margin: 25px 0 30px;
        }

        .form-control input,
        .country-code {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 14px 14px 45px;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control input::placeholder {
            color: rgba(255, 215, 0, 0.5);
        }

        .form-control input:focus,
        .country-code:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), inset 0 0 10px rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.12);
        }

        .form-control label {
            position: absolute;
            top: 14px;
            left: 45px;
            pointer-events: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .form-control label span {
            display: inline-block;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .form-control input:focus ~ label,
        .form-control input:valid ~ label {
            transform: translateY(-38px) translateX(-35px);
            font-size: 12px;
            color: var(--primary);
            background: var(--container-start);
            padding: 0 8px;
            border-radius: 10px;
        }

        .form-control input:focus ~ label span,
        .form-control input:valid ~ label span {
            transform: scale(0.9);
            color: var(--primary);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 17px;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .form-control input:focus ~ .input-icon,
        .country-code:focus ~ .input-icon {
            color: var(--primary);
        }

        /* ================= PHONE INPUT GROUP ================= */
        .phone-input-group {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 110px;
            padding: 14px 30px 14px 12px;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23FFD700'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 18px;
        }

        .country-code option {
            background: var(--container-start);
            color: #fff;
            padding: 10px;
        }

        .phone-input-wrapper {
            flex: 1;
            position: relative;
        }

        .phone-input-wrapper input {
            width: 100%;
        }

        /* ================= ERROR MESSAGES ================= */
        .error-message {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            display: none;
            padding-left: 10px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ================= BUTTON STYLES ================= */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 14px;
            padding: 14px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-loader {
            width: 18px;
            height: 18px;
            border: 3px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ================= MESSAGE DISPLAY ================= */
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message.success {
            display: block;
            background: rgba(0, 200, 81, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .message.error {
            display: block;
            background: rgba(255, 85, 85, 0.15);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .message.info {
            display: block;
            background: rgba(255, 215, 0, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ================= DIVIDER ================= */
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 60px);
            height: 1px;
            background: rgba(255, 215, 0, 0.3);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: var(--container-start);
            padding: 0 15px;
            color: var(--text-light);
            font-size: 13px;
            font-weight: 500;
        }

        /* ================= GOOGLE BUTTON ================= */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
            border: 2px solid var(--primary);
            border-radius: 14px;
            color: #222;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .google-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .google-btn i {
            color: #4285f4;
            font-size: 20px;
        }

        /* ================= FOOTER LINKS ================= */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* ================= LOADER ================= */
        .loader-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }

        .loader-dots span {
            display: inline-block;
            width: 14px;
            height: 14px;
            margin: 0 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: dotPulse 1.2s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .loader-overlay p {
            color: var(--primary);
            margin-top: 20px;
            font-weight: 600;
            font-size: 16px;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 420px) {
            .container {
                width: 95%;
                padding: 25px 18px;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .form-control input,
            .country-code {
                font-size: 14px;
                padding: 12px 12px 12px 40px;
            }
            
            .phone-input-group {
                gap: 8px;
            }
            
            .country-code {
                width: 100px;
            }
            
            .btn {
                font-size: 14px;
                padding: 12px;
            }
            
            .footer-links {
                gap: 12px;
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <i class="fas fa-gamepad logo-icon"></i>
            <h1>Veno-Arena</h1>
            <p class="tagline">Your Ultimate Gaming Destination</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-control">
                <input type="text" id="username" required autocomplete="off">
                <label for="username"><span>U</span><span>s</span><span>e</span><span>r</span><span>n</span><span>a</span><span>m</span><span>e</span></label>
                <i class="fas fa-user input-icon"></i>
                <span id="usernameError" class="error-message"></span>
            </div>
            
            <div class="form-control">
                <input type="email" id="email" required autocomplete="off">
                <label for="email"><span>E</span><span>m</span><span>a</span><span>i</span><span>l</span></label>
                <i class="fas fa-envelope input-icon"></i>
                <span id="emailError" class="error-message"></span>
            </div>
            
            <div class="form-control">
                <div class="phone-input-group">
                    <select id="countryCode" class="country-code" required>
                        <option value="" disabled selected>🌍 Code</option>
                    </select>
                    <div class="phone-input-wrapper">
                        <input type="tel" id="phone" required autocomplete="off">
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>
                <span id="phoneError" class="error-message"></span>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login / Register</span>
                <div class="btn-loader"></div>
            </button>
            
            <div class="message" id="message"></div>
        </form>
        
        <!-- Divider -->
        <div class="divider">
            <span>Or continue with</span>
        </div>
        
        <!-- Google Login -->
        <button onclick="handleGoogleLogin()" class="google-btn">
            <i class="fab fa-google"></i>
            <span>Continue with Google</span>
        </button>
        
        <!-- Footer Links -->
        <div class="footer-links">
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Help</a>
        </div>
    </div>
    
    <!-- Loader -->
    <div id="loader" class="loader-overlay">
        <div class="loader-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <p>Loading...</p>
    </div>

    <!-- FIREBASE & JAVASCRIPT -->
    <script type="module">
        // ================= FIREBASE SETUP =================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc,
            collection,
            query,
            where,
            getDocs 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW0Sz7TODfa8tQJTfNUaLhfK9qJhdA1yE",
            authDomain: "crunck-app.firebaseapp.com",
            projectId: "crunck-app",
            storageBucket: "crunck-app.firebasestorage.app",
            messagingSenderId: "475953302982",
            appId: "1:475953302982:web:607e08379adb12f985f6c7",
            measurementId: "G-7ZQ20HK4SD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });

        window.auth = auth;
        window.db = db;

        // ================= SESSION CHECK =================
        const savedUser = localStorage.getItem("crunkUser");
        if (savedUser) {
            const user = JSON.parse(savedUser);
            if (user.hasSetProfile) {
                setTimeout(() => window.location.href = "home.html", 500);
            } else {
                setTimeout(() => window.location.href = "profile-settings.html", 500);
            }
        }

        // ================= COUNTRY CODES =================
        function getCountryCodes() {
            return [
                { code: "+1", country: "United States" },
                { code: "+44", country: "United Kingdom" },
                { code: "+91", country: "India" },
                { code: "+86", country: "China" },
                { code: "+81", country: "Japan" },
                { code: "+33", country: "France" },
                { code: "+49", country: "Germany" },
                { code: "+39", country: "Italy" },
                { code: "+34", country: "Spain" },
                { code: "+61", country: "Australia" },
                { code: "+55", country: "Brazil" },
                { code: "+27", country: "South Africa" },
                { code: "+65", country: "Singapore" },
                { code: "+852", country: "Hong Kong" },
                { code: "+82", country: "South Korea" },
                { code: "+358", country: "Finland" },
                { code: "+46", country: "Sweden" },
                { code: "+47", country: "Norway" },
                { code: "+31", country: "Netherlands" },
                { code: "+32", country: "Belgium" }
            ];
        }

        function populateCountryCodes() {
            const countryCodeSelect = document.getElementById("countryCode");
            if (!countryCodeSelect) return;
            
            const countries = getCountryCodes();
            countries.forEach(country => {
                const option = document.createElement("option");
                option.value = country.code;
                option.textContent = `${country.country} (${country.code})`;
                countryCodeSelect.appendChild(option);
            });
        }

        document.addEventListener('DOMContentLoaded', populateCountryCodes);

        // ================= LABEL ANIMATION =================
        window.addEventListener('load', () => {
            const container = document.querySelector('.container');
            if (container) container.classList.add('show');
        });

        // ================= FORM SUBMISSION =================
        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");

        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const username = document.getElementById("username")?.value.trim();
                const email = document.getElementById("email")?.value.trim();
                const countryCode = document.getElementById("countryCode")?.value || "+1";
                const phoneNumber = document.getElementById("phone")?.value.trim();
                const fullPhoneNumber = countryCode + phoneNumber;

                // Validations
                if (!username || !email || !phoneNumber) {
                    showMessage("Please fill all fields.", "error");
                    return;
                }

                if (!document.getElementById("countryCode")?.value) {
                    showMessage("Please select your country code.", "error");
                    return;
                }

                if (username.length < 3) {
                    showMessage("Username must be at least 3 characters.", "error");
                    return;
                }

                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    showMessage("Username can only contain letters, numbers, and underscores.", "error");
                    return;
                }

                if (!/^\S+@\S+\.\S+$/.test(email)) {
                    showMessage("Enter a valid email address.", "error");
                    return;
                }

                if (!/^\d{7,15}$/.test(phoneNumber)) {
                    showMessage("Enter a valid phone number (7-15 digits).", "error");
                    return;
                }

                try {
                    showLoader(true);
                    
                    const usersRef = collection(db, "users");
                    const q = query(usersRef, where("email", "==", email));
                    const querySnapshot = await getDocs(q);
                    
                    if (!querySnapshot.empty) {
                        const existingUser = querySnapshot.docs[0].data();
                        const userData = {
                            username: existingUser.displayName || existingUser.username,
                            displayName: existingUser.displayName || existingUser.username,
                            email: existingUser.email,
                            phone: existingUser.phone,
                            photoURL: existingUser.photoURL || null,
                            userId: querySnapshot.docs[0].id,
                            hasSetProfile: existingUser.hasSetProfile || false
                        };
                        localStorage.setItem("crunkUser", JSON.stringify(userData));
                        
                        showMessage("Login successful! Redirecting...", "success");
                        setTimeout(() => {
                            window.location.href = userData.hasSetProfile ? "home.html" : "profile-settings.html";
                        }, 1500);
                        return;
                    }

                    const userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);

                    const newUser = {
                        uid: userId,
                        username: username,
                        displayName: username,
                        email: email,
                        phone: fullPhoneNumber,
                        countryCode: countryCode,
                        phoneNumber: phoneNumber,
                        photoURL: null,
                        loginMethod: "form",
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString(),
                        status: 'online',
                        userId: userId,
                        hasSetProfile: false
                    };

                    try {
                        await setDoc(doc(db, "users", userId), newUser);
                    } catch (firestoreError) {
                        console.log("Firestore unavailable, using localStorage only");
                    }

                    localStorage.setItem("crunkUser", JSON.stringify({ 
                        username: username,
                        displayName: username,
                        email: email, 
                        phone: fullPhoneNumber,
                        photoURL: null,
                        userId: userId,
                        hasSetProfile: false
                    }));

                    showMessage("Registration successful! Please setup your profile.", "success");
                    setTimeout(() => window.location.href = "profile-settings.html", 1500);

                } catch (err) {
                    console.error("Login error:", err);
                    showMessage("Error processing login. Please try again.", "error");
                } finally {
                    showLoader(false);
                }
            });
        }

        // ================= GOOGLE LOGIN =================
        window.handleGoogleLogin = async function() {
            try {
                showLoader(true);
                
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                
                let userData;
                
                if (userDoc.exists()) {
                    const existingUser = userDoc.data();
                    userData = {
                        username: existingUser.displayName || user.displayName,
                        displayName: existingUser.displayName || user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        userId: user.uid,
                        hasSetProfile: existingUser.hasSetProfile || false
                    };
                } else {
                    const newUser = {
                        uid: user.uid,
                        username: user.displayName,
                        displayName: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        loginMethod: "google",
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString(),
                        status: 'online',
                        userId: user.uid,
                        hasSetProfile: false
                    };
                    
                    try {
                        await setDoc(userDocRef, newUser);
                    } catch (e) {
                        console.log("Firestore error:", e.message);
                    }
                    
                    userData = {
                        username: user.displayName,
                        displayName: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        userId: user.uid,
                        hasSetProfile: false
                    };
                }
                
                localStorage.setItem("crunkUser", JSON.stringify(userData));
                showMessage("Google login successful! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = userData.hasSetProfile ? "home.html" : "profile-settings.html";
                }, 1000);
                
            } catch (error) {
                console.error("Google login error:", error);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showMessage("Login cancelled. Please try again.", "info");
                } else if (error.code === 'auth/popup-blocked') {
                    showMessage("Popup was blocked. Please allow popups.", "error");
                } else if (error.code === 'auth/unauthorized-domain') {
                    showMessage(`Domain not authorized in Firebase console.`, "error");
                } else {
                    showMessage("Login failed: " + error.message, "error");
                }
            } finally {
                showLoader(false);
            }
        };

        // ================= INPUT VALIDATION =================
        const usernameInput = document.getElementById("username");
        if (usernameInput) {
            usernameInput.addEventListener("input", (e) => {
                const value = e.target.value;
                const errorSpan = document.getElementById("usernameError");
                if (errorSpan) {
                    if (value.length < 3 && value.length > 0) {
                        errorSpan.textContent = "Username too short";
                        errorSpan.style.display = 'block';
                    } else if (!/^[a-zA-Z0-9_]+$/.test(value) && value.length > 0) {
                        errorSpan.textContent = "Only letters, numbers, _";
                        errorSpan.style.display = 'block';
                    } else {
                        errorSpan.textContent = "";
                        errorSpan.style.display = 'none';
                    }
                }
            });
        }

        const emailInput = document.getElementById("email");
        if (emailInput) {
            emailInput.addEventListener("input", (e) => {
                const value = e.target.value;
                const errorSpan = document.getElementById("emailError");
                if (errorSpan) {
                    if (!/^\S+@\S+\.\S+$/.test(value) && value.length > 0) {
                        errorSpan.textContent = "Invalid email format";
                        errorSpan.style.display = 'block';
                    } else {
                        errorSpan.textContent = "";
                        errorSpan.style.display = 'none';
                    }
                }
            });
        }

        const phoneInput = document.getElementById("phone");
        if (phoneInput) {
            phoneInput.addEventListener("input", (e) => {
                const value = e.target.value;
                const errorSpan = document.getElementById("phoneError");
                if (errorSpan) {
                    if (!/^\d*$/.test(value) && value.length > 0) {
                        errorSpan.textContent = "Only numbers allowed";
                        errorSpan.style.display = 'block';
                    } else if (value.length > 0 && (value.length < 7 || value.length > 15)) {
                        errorSpan.textContent = "Phone must be 7-15 digits";
                        errorSpan.style.display = 'block';
                    } else {
                        errorSpan.textContent = "";
                        errorSpan.style.display = 'none';
                    }
                }
            });
        }

        // ================= HELPER FUNCTIONS =================
        function showMessage(text, type = "info") {
            if (!message) return;
            
            message.innerText = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            
            if (type === "success") {
                setTimeout(() => {
                    message.innerText = "";
                    message.className = "message";
                    message.style.display = 'none';
                }, 3000);
            }
        }

        function showLoader(show) {
            const loader = document.getElementById("loader");
            if (loader) {
                loader.style.display = show ? "flex" : "none";
            }
        }

        window.showMessage = showMessage;
        window.showLoader = showLoader;
    </script>
</body>
</html>
