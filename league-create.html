<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Create League - Crunk Games</title>
    
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="nav.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-primary: #05070d;
            --bg-secondary: #0b1222;
            --bg-tertiary: #111827;
            --border-color: #1f2937;
            --text-primary: #e6e6e6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .menu {
            font-size: 24px;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s ease;
            padding: 8px;
            border-radius: 50%;
        }

        .menu:hover {
            background: rgba(16, 185, 129, 0.1);
            transform: scale(1.1);
        }

        .icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .veno-coins-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .veno-coins-display {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .veno-coins-display i {
            color: #fbbf24;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid var(--primary);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            transition: all 0.3s ease;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h3 {
            color: var(--primary);
            font-size: 20px;
        }

        .close-sidebar {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-sidebar:hover {
            color: #ff5555;
            transform: rotate(90deg);
        }

        .venaura-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            margin-bottom: 20px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            cursor: pointer;
        }

        .venaura-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .sidebar-menu li i {
            width: 24px;
            color: var(--primary);
        }

        .sidebar-menu li:hover {
            background: var(--primary);
            color: var(--bg-primary);
            transform: translateX(5px);
        }

        .sidebar-menu li.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-theme {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            cursor: pointer;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Profile Popup */
        .profile-popup {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            width: 220px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 15px;
            z-index: 1001;
        }

        .profile-popup.active {
            display: block;
        }

        .account-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .account-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        #logoutBtn {
            width: 100%;
            padding: 8px;
            background: #ff5555;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        /* Create League Container */
        .create-league-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 30px;
            background: var(--bg-tertiary);
            border-radius: 24px;
            border: 1px solid var(--border-color);
        }
        
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .prize-distribution {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
        }
        
        .prize-input { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; }
        .prize-input label { width: 80px; margin-bottom: 0; }
        .prize-input input { flex: 1; background: var(--bg-tertiary); }
        
        .btn-create {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none; border-radius: 30px;
            color: white; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: all 0.3s ease;
            margin-top: 20px;
        }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4); }
        
        .format-options {
            display: flex; gap: 15px; flex-wrap: wrap;
            margin-top: 10px;
        }
        .format-option {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .format-option.active {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }
        
        .error-message { color: #ff5555; font-size: 12px; margin-top: 5px; display: none; }
        
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
        }
        
        .toast {
            background: var(--primary);
            color: var(--bg-primary);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        @media (max-width: 768px) {
            .create-league-container {
                margin: 15px;
                padding: 20px;
            }
            .prize-input {
                flex-direction: column;
                align-items: flex-start;
            }
            .prize-input label {
                width: auto;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="topbar">
        <div class="menu" id="menuBtn"><i class="bx bx-menu"></i></div>
        <div class="brand"><h1>🏆 Create New League</h1></div>
        <div class="icons">
            <div class="veno-coins-container">
                <div class="veno-coins-display"><i class="fas fa-coins"></i><span id="venoCoinsAmount">0</span></div>
                <button id="claimVenoCoinsBtn" class="claim-veno-btn"><i class="fas fa-gift"></i> Claim 10</button>
            </div>
            <div class="profile-dropdown" id="profileDropdown">
                <img id="googleProfilePic" class="profile-pic" src="https://ui-avatars.com/api/?name=User&background=10b981&color=fff&size=128">
                <div class="profile-popup" id="profilePopup">
                    <div class="account-info">
                        <img id="popupProfilePic">
                        <div>
                            <p id="accountName"></p>
                            <p id="accountEmail"></p>
                        </div>
                    </div>
                    <button id="logoutBtn"><i class="bx bx-log-out"></i> Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <span class="close-sidebar" id="closeSidebar"><i class="bx bx-x"></i></span>
        </div>
        <div class="venaura-section" id="venauraIcon">
            <div class="venaura-icon"><i class="fas fa-trophy"></i></div>
            <div class="venaura-info"><h3>Venaura App</h3><p>Connect with Venaura</p></div>
            <i class="bx bx-right-arrow-alt arrow-icon"></i>
        </div>
        <ul class="sidebar-menu">
            <li id="menuHome"><i class="bx bx-home"></i> Home</li>
            <li id="menuTournaments"><i class="bx bx-trophy"></i> Tournaments</li>
            <li id="menuCreateLeague" class="active"><i class="bx bx-plus-circle"></i> Create League</li>
        </ul>
        <div class="sidebar-footer">
            <div class="sidebar-theme" id="menuTheme">
                <span><i class="bx bx-palette"></i> Theme: <span id="themeLabel">Dark</span></span>
                <div class="theme-toggle">
                    <i class="bx bx-sun" style="display: none;"></i>
                    <i class="bx bx-moon"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="create-league-container">
        <h2 style="margin-bottom: 20px;">Create Your Football League</h2>
        
        <form id="createLeagueForm">
            <div class="form-group">
                <label>League Name *</label>
                <input type="text" id="leagueName" placeholder="e.g., Champions League 2026" required>
                <div class="error-message" id="leagueNameError">League name is required</div>
            </div>
            
            <div class="form-group">
                <label>Game Type *</label>
                <select id="gameType" required>
                    <option value="eFootball">eFootball</option>
                    <option value="FC">FC (FIFA/EA Sports FC)</option>
                    <option value="DLS">Dream League Soccer (DLS)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>League Format *</label>
                <div class="format-options" id="formatOptions">
                    <div class="format-option active" data-format="league">League (Round Robin)</div>
                    <div class="format-option" data-format="group">Group Stage + Knockout</div>
                    <div class="format-option" data-format="cup">Cup (Knockout)</div>
                </div>
                <input type="hidden" id="leagueFormat" value="league">
            </div>
            
            <div class="form-group">
                <label>Max Teams (4-32)</label>
                <input type="number" id="maxTeams" min="4" max="32" value="16">
            </div>
            
            <div class="form-group">
                <label>Entry Fee (Veno Coins)</label>
                <input type="number" id="entryFee" min="0" value="50">
            </div>
            
            <div class="form-group">
                <label>Prize Distribution</label>
                <div class="prize-distribution">
                    <div class="prize-input"><label>1st Place (50%)</label><input type="number" id="firstPrize" readonly></div>
                    <div class="prize-input"><label>2nd Place (30%)</label><input type="number" id="secondPrize" readonly></div>
                    <div class="prize-input"><label>3rd Place (20%)</label><input type="number" id="thirdPrize" readonly></div>
                </div>
            </div>
            
            <div class="form-group">
                <label>League Description (Optional)</label>
                <textarea id="description" rows="3" placeholder="Describe your league rules, schedule, etc."></textarea>
            </div>
            
            <button type="submit" class="btn-create">
                <i class="fas fa-trophy"></i> Create League
            </button>
        </form>
    </div>

    <div id="toastContainer" class="toast-container"></div>
</div>

<script>
    // ================= HAMBURGER MENU =================
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.add('open');
                if (overlay) overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
            
            const closeFunc = () => {
                sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            };
            
            if (closeSidebar) closeSidebar.addEventListener('click', closeFunc);
            if (overlay) overlay.addEventListener('click', closeFunc);
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar.classList.contains('open')) closeFunc();
            });
        }
        
        // Sidebar Navigation
        const menuHome = document.getElementById('menuHome');
        const menuTournaments = document.getElementById('menuTournaments');
        
        if (menuHome) menuHome.addEventListener('click', () => window.location.href = 'home.html');
        if (menuTournaments) menuTournaments.addEventListener('click', () => window.location.href = 'tournaments.html');
        
        // Venaura Icon
        const venauraIcon = document.getElementById('venauraIcon');
        if (venauraIcon) {
            venauraIcon.addEventListener('click', () => {
                window.open('https://venauraai.netlify.app/', '_blank');
            });
        }
        
        // Profile Dropdown
        const profileDropdown = document.getElementById('profileDropdown');
        const profilePopup = document.getElementById('profilePopup');
        if (profileDropdown && profilePopup) {
            profileDropdown.addEventListener('click', (e) => {
                e.stopPropagation();
                profilePopup.classList.toggle('active');
            });
            document.addEventListener('click', () => profilePopup.classList.remove('active'));
        }
        
        // Logout
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('crunkUser');
                window.location.href = 'index.html';
            });
        }
        
        // Theme Toggle
        const menuTheme = document.getElementById('menuTheme');
        const themeLabel = document.getElementById('themeLabel');
        if (menuTheme) {
            menuTheme.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');
                const isLight = document.body.classList.contains('light-theme');
                themeLabel.innerText = isLight ? 'Light' : 'Dark';
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                
                const sunIcon = menuTheme.querySelector('.bx-sun');
                const moonIcon = menuTheme.querySelector('.bx-moon');
                if (sunIcon && moonIcon) {
                    sunIcon.style.display = isLight ? 'inline-block' : 'none';
                    moonIcon.style.display = isLight ? 'none' : 'inline-block';
                }
            });
        }
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
            if (themeLabel) themeLabel.innerText = 'Light';
        }
    });
    
    // ================= LEAGUE CREATION LOGIC =================
    
    function updatePrizeDistribution() {
        const totalTeams = parseInt(document.getElementById('maxTeams').value) || 16;
        const entryFee = parseInt(document.getElementById('entryFee').value) || 0;
        const totalPrize = totalTeams * entryFee * 0.8;
        
        document.getElementById('firstPrize').value = Math.floor(totalPrize * 0.5);
        document.getElementById('secondPrize').value = Math.floor(totalPrize * 0.3);
        document.getElementById('thirdPrize').value = Math.floor(totalPrize * 0.2);
    }
    
    document.getElementById('maxTeams')?.addEventListener('change', updatePrizeDistribution);
    document.getElementById('entryFee')?.addEventListener('change', updatePrizeDistribution);
    
    // Format selector
    document.querySelectorAll('.format-option').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.format-option').forEach(o => o.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('leagueFormat').value = this.dataset.format;
        });
    });
    
    updatePrizeDistribution();
    
    // Form submission
    document.getElementById('createLeagueForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const leagueName = document.getElementById('leagueName').value.trim();
        if (!leagueName) {
            document.getElementById('leagueNameError').style.display = 'block';
            return;
        }
        document.getElementById('leagueNameError').style.display = 'none';
        
        const currentUser = JSON.parse(localStorage.getItem('crunkUser'));
        if (!currentUser) {
            showToast('Please login first', 'error');
            window.location.href = 'index.html';
            return;
        }
        
        const totalTeams = parseInt(document.getElementById('maxTeams').value);
        const entryFee = parseInt(document.getElementById('entryFee').value);
        const totalPrize = totalTeams * entryFee * 0.8;
        
        const leagueData = {
            id: 'league_' + Date.now(),
            name: leagueName,
            gameType: document.getElementById('gameType').value,
            format: document.getElementById('leagueFormat').value,
            maxTeams: totalTeams,
            entryFee: entryFee,
            prizePool: totalPrize,
            prizes: {
                first: parseInt(document.getElementById('firstPrize').value),
                second: parseInt(document.getElementById('secondPrize').value),
                third: parseInt(document.getElementById('thirdPrize').value)
            },
            description: document.getElementById('description').value,
            ownerId: currentUser.uid,
            ownerName: currentUser.displayName,
            createdAt: new Date().toISOString(),
            status: 'registration',
            teams: [],
            matches: [],
            pendingRequests: []
        };
        
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        leagues.push(leagueData);
        localStorage.setItem('leagues', JSON.stringify(leagues));
        
        showToast('League created successfully!', 'success');
        setTimeout(() => {
            window.location.href = `league-view.html?id=${leagueData.id}`;
        }, 1500);
    });
    
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    function getVenoCoins() { return parseInt(localStorage.getItem('venoCoins') || '0'); }
    function updateVenoCoinsDisplay() { document.getElementById('venoCoinsAmount').innerText = getVenoCoins(); }
    updateVenoCoinsDisplay();
    
    const claimBtn = document.getElementById('claimVenoCoinsBtn');
    if (claimBtn) {
        const LAST_CLAIM_KEY = 'lastVenoClaim';
        function canClaim() {
            const last = localStorage.getItem(LAST_CLAIM_KEY);
            if (!last) return true;
            return (Date.now() - parseInt(last)) >= 24 * 60 * 60 * 1000;
        }
        claimBtn.addEventListener('click', () => {
            if (canClaim()) {
                localStorage.setItem('venoCoins', getVenoCoins() + 10);
                localStorage.setItem(LAST_CLAIM_KEY, Date.now().toString());
                updateVenoCoinsDisplay();
                showToast('🎉 You claimed 10 Veno Coins!', 'success');
            } else {
                showToast('Already claimed! Come back tomorrow', 'error');
            }
        });
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBW0Sz7TODfa8tQJTfNUaLhfK9qJhdA1yE",
        authDomain: "crunck-app.firebaseapp.com",
        projectId: "crunck-app",
        storageBucket: "crunck-app.firebasestorage.app",
        messagingSenderId: "475953302982",
        appId: "1:475953302982:web:607e08379adb12f985f6c7"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('googleProfilePic').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}&background=10b981&color=fff`;
            document.getElementById('popupProfilePic').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}&background=10b981&color=fff`;
            document.getElementById('accountName').innerText = user.displayName;
            document.getElementById('accountEmail').innerText = user.email;
        } else {
            window.location.href = 'index.html';
        }
    });
</script>

<script src="nav.js"></script>
</body>
</html>
