    <div class="create-league-container">
        <h2 style="margin-bottom: 20px;">Create Your Football League</h2>
        
        <form id="createLeagueForm">
            <div class="form-group">
                <label>League Name *</label>
                <input type="text" id="leagueName" placeholder="e.g., Champions League 2026" required>
                <div class="error-message" id="leagueNameError">League name is required</div>
            </div>
            
            <div class="form-group">
                <label>Game Type *</label>
                <select id="gameType" required>
                    <option value="eFootball">eFootball</option>
                    <option value="FC">FC (FIFA/EA Sports FC)</option>
                    <option value="DLS">Dream League Soccer (DLS)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>League Format *</label>
                <div class="format-options" id="formatOptions">
                    <div class="format-option active" data-format="league">League (Round Robin)</div>
                    <div class="format-option" data-format="group">Group Stage + Knockout</div>
                    <div class="format-option" data-format="cup">Cup (Knockout)</div>
                </div>
                <input type="hidden" id="leagueFormat" value="league">
            </div>
            
            <div class="form-group">
                <label>Max Teams (4-32)</label>
                <input type="number" id="maxTeams" min="4" max="32" value="16">
            </div>
            
            <div class="form-group">
                <label>Entry Fee (Veno Coins)</label>
                <input type="number" id="entryFee" min="0" value="50">
            </div>
            
            <div class="form-group">
                <label>Prize Distribution</label>
                <div class="prize-distribution">
                    <div class="prize-input"><label>1st Place (50%)</label><input type="number" id="firstPrize" readonly></div>
                    <div class="prize-input"><label>2nd Place (30%)</label><input type="number" id="secondPrize" readonly></div>
                    <div class="prize-input"><label>3rd Place (20%)</label><input type="number" id="thirdPrize" readonly></div>
                </div>
            </div>
            
            <div class="form-group">
                <label>League Description (Optional)</label>
                <textarea id="description" rows="3" placeholder="Describe your league rules, schedule, etc."></textarea>
            </div>
            
            <button type="submit" class="btn-create">
                <i class="fas fa-trophy"></i> Create League
            </button>
        </form>

<script>
    // Calculate prize distribution
    function updatePrizeDistribution() {
        const totalTeams = parseInt(document.getElementById('maxTeams').value) || 16;
        const entryFee = parseInt(document.getElementById('entryFee').value) || 0;
        const totalPrize = totalTeams * entryFee * 0.8; // 80% goes to prize pool
        
        const first = Math.floor(totalPrize * 0.5);
        const second = Math.floor(totalPrize * 0.3);
        const third = Math.floor(totalPrize * 0.2);
        
        document.getElementById('firstPrize').value = first;
        document.getElementById('secondPrize').value = second;
        document.getElementById('thirdPrize').value = third;
    }
    
    document.getElementById('maxTeams')?.addEventListener('change', updatePrizeDistribution);
    document.getElementById('entryFee')?.addEventListener('change', updatePrizeDistribution);
    
    // Format selector
    document.querySelectorAll('.format-option').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.format-option').forEach(o => o.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('leagueFormat').value = this.dataset.format;
        });
    });
    
    updatePrizeDistribution();
    
    // Form submission
    document.getElementById('createLeagueForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const leagueName = document.getElementById('leagueName').value.trim();
        if (!leagueName) {
            document.getElementById('leagueNameError').style.display = 'block';
            return;
        }
        document.getElementById('leagueNameError').style.display = 'none';
        
        const leagueData = {
            name: leagueName,
            gameType: document.getElementById('gameType').value,
            format: document.getElementById('leagueFormat').value,
            maxTeams: parseInt(document.getElementById('maxTeams').value),
            entryFee: parseInt(document.getElementById('entryFee').value),
            prizePool: parseInt(document.getElementById('firstPrize').value) + parseInt(document.getElementById('secondPrize').value) + parseInt(document.getElementById('thirdPrize').value),
            prizes: {
                first: parseInt(document.getElementById('firstPrize').value),
                second: parseInt(document.getElementById('secondPrize').value),
                third: parseInt(document.getElementById('thirdPrize').value)
            },
            description: document.getElementById('description').value,
            ownerId: currentUser?.uid,
            ownerName: currentUser?.displayName,
            createdAt: new Date().toISOString(),
            status: 'registration',
            teams: [],
            matches: [],
            standings: []
        };
        
        // Save to localStorage
        const leagues = JSON.parse(localStorage.getItem('leagues') || '[]');
        leagueData.id = 'league_' + Date.now();
        leagues.push(leagueData);
        localStorage.setItem('leagues', JSON.stringify(leagues));
        
        showToast('League created successfully!', 'success');
        setTimeout(() => {
            window.location.href = 'tournaments.html';
        }, 1500);
    });
    // After saving league data
showToast('League created successfully!', 'success');
setTimeout(() => {
    window.location.href = `league-view.html?id=${leagueData.id}`;
}, 1500);
</script>

<script>
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    function getVenoCoins() { return parseInt(localStorage.getItem('venoCoins') || '0'); }
    function updateVenoCoinsDisplay() { document.getElementById('venoCoinsAmount').innerText = getVenoCoins(); }
    updateVenoCoinsDisplay();
    
    const claimBtn = document.getElementById('claimVenoCoinsBtn');
    if (claimBtn) {
        const LAST_CLAIM_KEY = 'lastVenoClaim';
        function canClaim() {
            const last = localStorage.getItem(LAST_CLAIM_KEY);
            if (!last) return true;
            return (Date.now() - parseInt(last)) >= 24 * 60 * 60 * 1000;
        }
        claimBtn.addEventListener('click', () => {
            if (canClaim()) {
                localStorage.setItem('venoCoins', getVenoCoins() + 10);
                localStorage.setItem(LAST_CLAIM_KEY, Date.now().toString());
                updateVenoCoinsDisplay();
                showToast('🎉 You claimed 10 Veno Coins!', 'success');
            } else {
                showToast('Already claimed! Come back tomorrow', 'error');
            }
        });
    }
</script>
