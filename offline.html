<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Crunk Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #05070d, #0f172a);
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 400px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: #10b981;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }
        
        p {
            color: #9ca3af;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }
        
        .tips {
            background: rgba(16, 185, 129, 0.1);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .tips h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #10b981;
        }
        
        .tips ul {
            list-style: none;
            font-size: 12px;
            color: #9ca3af;
        }
        
        .tips li {
            margin: 5px 0;
        }
        
        .tips li i {
            margin-right: 5px;
            color: #10b981;
        }
    </style>
    <!-- PWA Meta Tags - Required for icon to show when sharing -->

<meta name="theme-color" content="#10b981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crunk Games">
<meta name="mobile-web-app-capable" content="yes">
<meta name="msapplication-TileColor" content="#10b981">
<meta name="msapplication-TileImage" content="/icons/icon-144x144.png">

<!-- Favicon and Icons - CRITICAL for link sharing -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png">
<link rel="apple-touch-icon" sizes="114x114" href="/icons/icon-114x114.png">
<link rel="apple-touch-icon" sizes="76x76" href="/icons/icon-76x76.png">
<link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png">
<link rel="apple-touch-icon" sizes="60x60" href="/icons/icon-60x60.png">
<link rel="apple-touch-icon" sizes="57x57" href="/icons/icon-57x57.png">

<!-- For social sharing (WhatsApp, Facebook, Twitter, Telegram) -->
<meta property="og:title" content="Crunk Games">
<meta property="og:description" content="Play tournaments, create teams, and earn Veno Coins!">
<meta property="og:image" content="https://your-domain.com/icon-512x512.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:type" content="website">
<meta property="og:url" content="https://your-domain.com">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Crunk Games">
<meta name="twitter:description" content="Play tournaments, create teams, and earn Veno Coins!">
<meta name="twitter:image" content="https://your-domain.com/icon-512x512.png">
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi"></i>
        </div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again. Your saved data will sync when you're back online.</p>
        <button class="retry-btn" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Try Again
        </button>
        
        <div class="tips">
            <h3><i class="fas fa-lightbulb"></i> What you can do offline:</h3>
            <ul>
                <li><i class="fas fa-check-circle"></i> View your saved teams</li>
                <li><i class="fas fa-check-circle"></i> Check your Veno Coins balance</li>
                <li><i class="fas fa-check-circle"></i> View previously loaded tournaments</li>
                <li><i class="fas fa-check-circle"></i> Plan your next strategy</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Listen for online event
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
    <!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(registration => {
                console.log('✅ Service Worker registered:', registration);
            })
            .catch(error => {
                console.error('❌ Service Worker registration failed:', error);
            });
    });
}

// Show install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    
    // Optional: Show install button
    const installBtn = document.getElementById('installBtn');
    if (installBtn) {
        installBtn.style.display = 'flex';
        installBtn.onclick = () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                deferredPrompt = null;
                installBtn.style.display = 'none';
            });
        };
    }
});
</script>

<!-- Optional Install Button (add to top bar) -->
<button id="installBtn" style="display: none; background: none; border: none; color: #10b981; cursor: pointer;">
    <i class="fas fa-download"></i> Install App
</button>
</body>
</html>
